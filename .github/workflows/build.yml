name: Build Distributables

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  DOTNET_VERSION: 8.0.x
  JAVA_VERSION: "17"
  FLUTTER_VERSION: 3.29.3
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-bridge:
    name: Build FlipPanel Bridge
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build Windows distributables
        shell: pwsh
        run: |
          ./ReuseDisplay.Agent/installer/build-installer.ps1

      - name: Upload FlipPanel Bridge artifacts
        uses: actions/upload-artifact@v5
        with:
          name: flip-panel-bridge
          if-no-files-found: error
          retention-days: 14
          path: |
            可分发安装包/FlipPanel-Bridge.exe
            可分发安装包/FlipPanel-Bridge-win-x64.zip
            可分发安装包/FlipPanelBridgeSetup.exe

  build-companion:
    name: Build FlipPanel Companion
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install Flutter SDK
        shell: pwsh
        run: |
          $flutterRoot = Join-Path $env:RUNNER_TEMP 'flutter'
          if (Test-Path $flutterRoot) {
            Remove-Item $flutterRoot -Recurse -Force
          }
          git clone https://github.com/flutter/flutter.git --branch $env:FLUTTER_VERSION --depth 1 $flutterRoot
          "FLUTTER_ROOT=$flutterRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "$flutterRoot\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Flutter doctor
        shell: pwsh
        run: |
          flutter --version
          flutter config --no-analytics
          flutter doctor -v

      - name: Build Android APK
        shell: pwsh
        run: |
          ./FlipPanelFlutter/build-apk.ps1 -Clean

      - name: Upload FlipPanel Companion artifact
        uses: actions/upload-artifact@v5
        with:
          name: flip-panel-companion
          if-no-files-found: error
          retention-days: 14
          path: |
            可分发安装包/FlipPanel-Companion.apk

  bundle:
    name: Bundle artifacts
    runs-on: windows-2022
    needs:
      - build-bridge
      - build-companion

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Combine distributables
        shell: pwsh
        run: |
          $bundleRoot = Join-Path $PWD 'bundle'
          if (Test-Path $bundleRoot) {
            Remove-Item $bundleRoot -Recurse -Force
          }
          New-Item -ItemType Directory -Path $bundleRoot | Out-Null
          Copy-Item -Path artifacts\flip-panel-bridge\* -Destination $bundleRoot -Recurse -Force
          Copy-Item -Path artifacts\flip-panel-companion\* -Destination $bundleRoot -Recurse -Force
          Get-ChildItem -Path $bundleRoot | Select-Object Name, Length

      - name: Upload bundled distributables
        uses: actions/upload-artifact@v5
        with:
          name: flip-panel-distributables
          if-no-files-found: error
          retention-days: 14
          path: |
            bundle/*

  release:
    name: Publish GitHub Release
    runs-on: windows-2022
    needs:
      - bundle
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download bundled distributables
        uses: actions/download-artifact@v5
        with:
          name: flip-panel-distributables
          path: release-assets

      - name: Publish release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          $assetDir = Join-Path $PWD 'release-assets'
          $assetFiles = Get-ChildItem -LiteralPath $assetDir -File | ForEach-Object { $_.FullName }

          if (-not $assetFiles -or $assetFiles.Count -eq 0) {
            throw "No release assets found in $assetDir"
          }

          $notes = @"
          Automated release for $tag

          Included assets:
          - FlipPanel Bridge portable exe
          - FlipPanel Bridge portable zip
          - FlipPanel Bridge installer
          - FlipPanel Companion Android APK
          "@

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $assetFiles --clobber
          } else {
            gh release create $tag $assetFiles --title $tag --notes $notes
          }
